
services:
  master-1:
    image: mysql:8.0
    container_name: master-1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - ./master-1.cnf:/etc/mysql/conf.d/my.cnf
      - ./master-1.sql:/docker-entrypoint-initdb.d/start.sql
      - master1_data:/var/lib/mysql
    networks:
      - replication_mm

  master-2:
    image: mysql:8.0
    container_name: master-2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    volumes:
      - ./master-2.cnf:/etc/mysql/conf.d/my.cnf
      - ./master-2.sql:/docker-entrypoint-initdb.d/start.sql
      - master2_data:/var/lib/mysql
    networks:
      - replication_mm

volumes:
  master1_data:
  master2_data:

networks:
  replication_mm:
    driver: bridge
